<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PhishGuard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; background: #fff; color: #222; }
    .header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: #1a1a2e; color: #fff; }
    .header-icon { font-size: 20px; }
    .header-title { font-size: 15px; font-weight: 600; }
    .header-sub { font-size: 11px; color: #aaa; margin-top: 1px; }
    .status-card { margin: 12px; border-radius: 10px; padding: 14px; border: 1px solid #eee; }
    .status-card.danger { background: #fff5f5; border-color: #ffcdd2; }
    .status-card.safe { background: #f1f8e9; border-color: #c8e6c9; }
    .status-card.neutral { background: #f5f5f5; border-color: #e0e0e0; }
    .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .status-icon { font-size: 28px; }
    .status-label { font-size: 16px; font-weight: 700; }
    .status-label.danger { color: #c62828; }
    .status-label.safe { color: #2e7d32; }
    .status-label.neutral { color: #555; }
    .url-text { font-size: 11px; color: #666; word-break: break-all; background: rgba(0,0,0,.04); padding: 6px 8px; border-radius: 6px; margin-bottom: 8px; font-family: monospace; }
    .risk-label { font-size: 11px; color: #888; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .risk-bar-bg { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
    .risk-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .manual-check { margin: 0 12px 12px; }
    .manual-check input { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 8px 10px; font-size: 12px; outline: none; margin-bottom: 6px; }
    .check-btn { width: 100%; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; padding: 8px; font-size: 13px; cursor: pointer; font-weight: 500; }
    .check-btn:disabled { background: #999; cursor: not-allowed; }
    .footer { padding: 8px 16px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #aaa; }
    .footer a { color: #1565c0; text-decoration: none; font-size: 11px; }
    .divider { margin: 8px 12px; border: none; border-top: 1px solid #eee; }
    .section-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; padding: 0 12px 6px; }
    #loading { text-align: center; color: #888; padding: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🛡️</div>
    <div>
      <div class="header-title">PhishGuard</div>
      <div class="header-sub">ML-Powered Phishing Detector</div>
    </div>
  </div>
  <div id="loading">Checking current page...</div>
  <div id="status-section" style="display:none">
    <div id="status-card" class="status-card neutral">
      <div class="status-row">
        <div id="status-icon" class="status-icon">🔍</div>
        <div id="status-label" class="status-label neutral">Scanning...</div>
      </div>
      <div id="url-text" class="url-text"></div>
      <div class="risk-label"><span>Risk Score</span><span id="risk-pct">—</span></div>
      <div class="risk-bar-bg"><div id="risk-fill" class="risk-bar-fill" style="width:0%;background:#ccc"></div></div>
    </div>
  </div>
  <hr class="divider">
  <div class="section-label">Check any URL</div>
  <div class="manual-check">
    <input type="text" id="manual-url" placeholder="https://suspicious-site.com" />
    <button class="check-btn" id="check-btn">Analyse URL</button>
    <div id="manual-result" style="margin-top:8px;font-size:12px;color:#555;"></div>
  </div>
  <div class="footer">
    <span>Final Year Project · ML Phishing Detector</span>
    <a href="http://127.0.0.1:5000" target="_blank">Dashboard ↗</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
